name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          
      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets
          
      - name: Create Capacitor Config
        run: |
          echo "import { CapacitorConfig } from '@capacitor/cli';
          const config: CapacitorConfig = {
            appId: 'com.evgen.music',
            appName: 'Evgen Music',
            webDir: 'dist',
            server: { androidScheme: 'https' }
          };
          export default config;" > capacitor.config.ts

      - name: Build Web Project
        run: npm run build
        
      - name: Prepare Android Project
        run: |
          npx cap add android
          npx cap sync android

      - name: Generate App Icons
        # Создаем папку assets, кладем туда иконку и запускаем генератор без лишних флагов
        run: |
          mkdir -p assets
          cp icon.png assets/icon.png
          npx capacitor-assets generate --android

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: evgen-music-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
