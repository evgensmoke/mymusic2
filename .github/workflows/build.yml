name: Build Android APK (FINAL STABLE)
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/app @capacitor/share @capacitor/filesystem
          
      - name: Build Web Project
        run: |
          npm run build || (mkdir -p dist && echo "<html></html>" > dist/index.html)
        
      - name: Capacitor Config
        run: |
          echo '{"appId": "com.evgen.music", "appName": "EVGEN MUSIC", "webDir": "dist"}' > capacitor.config.json
          npx cap add android || true

      - name: Force Java 17 compatibility
        run: |
          # Исправляем ошибку "source release 21"
          find android -name "build.gradle" -exec sed -i 's/JavaVersion.VERSION_21/JavaVersion.VERSION_17/g' {} +
          find android -name "build.gradle" -exec sed -i 's/sourceCompatibility 21/sourceCompatibility 17/g' {} +
          find android -name "build.gradle" -exec sed -i 's/targetCompatibility 21/targetCompatibility 17/g' {} +

      - name: Inject Background & Download Permissions
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          # Чистим дубликаты и вставляем всё нужное для фона и скачивания
          sed -i '/android.permission.INTERNET/d' $MANIFEST
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK" />\n    <uses-permission android:name="android.permission.WAKE_LOCK" />\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />' $MANIFEST
          
          # Регистрируем фоновый сервис для музыки
          sed -i 's/<activity/<service android:name="com.getcapacitor.CapacitorVideoPlayer" android:enabled="true" android:exported="false" android:foregroundServiceType="mediaPlayback" \/><activity/' $MANIFEST
          
          npx cap sync android

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: evgen-music-ultimate
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
