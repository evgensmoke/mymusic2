name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets

      - name: Build Web Project
        run: |
          # ВНИМАНИЕ: Если тут будет ошибка — билд остановится. Это нам и нужно.
          npm run build

      - name: Initialize Capacitor
        run: |
          # Проверь, точно ли твои файлы после билда лежат в 'dist'. 
          # Если папка называется 'build' или 'www', замени "webDir": "dist" ниже.
          echo '{"appId": "com.evgen.music", "appName": "EVGEN MUSIC", "webDir": "dist"}' > capacitor.config.json
          npx cap add android || true

      - name: Generate Assets (Icon in Root)
        run: |
          # Создаем временную папку для генератора, если её нет
          mkdir -p assets
          # Если иконка лежит в корне как icon.png, копируем её в assets
          [ -f "icon.png" ] && cp icon.png assets/icon.png || echo "icon.png не найден в корне"
          [ -f "icon.jpg" ] && cp icon.jpg assets/icon.png || echo "icon.jpg не найден в корне"
          
          # Запускаем генерацию иконок
          if [ -f "assets/icon.png" ]; then
            npx capacitor-assets generate --android
          else
            echo "КРИТИЧЕСКАЯ ОШИБКА: Иконка не найдена ни в корне, ни в assets!"
          fi

      - name: Configure Android Permissions
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i '/android.permission.INTERNET/d' $MANIFEST
          sed -i '/<application/i <uses-permission android:name="android.permission.INTERNET" />\n<uses-permission android:name="android.permission.FOREGROUND_SERVICE" />\n<uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK" />\n<uses-permission android:name="android.permission.WAKE_LOCK" />' $MANIFEST
          npx cap sync android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: music-player-fixed
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
