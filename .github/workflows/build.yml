name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps
          # Добавляем @capacitor/share, на котором всё ломалось, и другие важные плагины
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets @capacitor/share @capacitor/filesystem @capacitor/app

      - name: Build Web Project
        run: |
          # Теперь билд должен пройти, так как все импорты на месте
          npm run build

      - name: Initialize Capacitor
        run: |
          echo '{"appId": "com.evgen.music", "appName": "EVGEN MUSIC", "webDir": "dist"}' > capacitor.config.json
          npx cap add android || true

      - name: Generate Assets (Icon from Root)
        run: |
          mkdir -p assets
          # Ищем иконку в корне и копируем её для генератора
          if [ -f "icon.png" ]; then cp icon.png assets/icon.png; 
          elif [ -f "icon.jpg" ]; then cp icon.jpg assets/icon.png;
          fi
          
          if [ -f "assets/icon.png" ]; then
            npx capacitor-assets generate --android
          else
            echo "ВНИМАНИЕ: Иконка не найдена в корне проекта!"
          fi

      - name: Configure Android Permissions
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i '/android.permission.INTERNET/d' $MANIFEST
          # Права для фона, интернета и работы с файлами
          sed -i '/<application/i <uses-permission android:name="android.permission.INTERNET" />\n<uses-permission android:name="android.permission.FOREGROUND_SERVICE" />\n<uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK" />\n<uses-permission android:name="android.permission.WAKE_LOCK" />\n<uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />' $MANIFEST
          # Сервис для корректной работы фонового аудио
          sed -i 's/<activity/<service android:name="com.getcapacitor.CapacitorVideoPlayer" android:enabled="true" android:exported="false" android:foregroundServiceType="mediaPlayback" \/><activity/' $MANIFEST
          npx cap sync android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: evgen-music-fixed
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
