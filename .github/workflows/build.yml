name: Build Android APK (ULTIMATE)
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          
      - name: Install Everything
        run: |
          npm install --legacy-peer-deps
          # Ставим всё для музыки, шторки и файлов разом
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets
          npm install @capacitor/share @capacitor/filesystem @capacitor-community/media-session
          
      - name: Create Capacitor Config
        run: |
          echo "import { CapacitorConfig } from '@capacitor/cli';
          const config: CapacitorConfig = {
            appId: 'com.evgen.music',
            appName: 'Evgen Music',
            webDir: 'dist',
            server: { androidScheme: 'https' },
            plugins: {
              SplashScreen: { launchShowDuration: 2000 }
            }
          };
          export default config;" > capacitor.config.ts

      - name: Build Web Project
        run: npm run build
        
      - name: Prepare Android & Permissions
        run: |
          npx cap add android
          # Магия: прописываем разрешения на фоновый режим и файлы прямо в манифест
          sed -i '/<application/i \    <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />' android/app/src/main/AndroidManifest.xml
          sed -i '/<application/i \    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />' android/app/src/main/AndroidManifest.xml
          sed -i '/<application/i \    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />' android/app/src/main/AndroidManifest.xml
          npx cap sync android

      - name: Generate App Icons
        run: |
          mkdir -p assets
          cp icon.png assets/icon.png || echo "Icon not found, skipping"
          npx capacitor-assets generate --android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: evgen-music-full
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
