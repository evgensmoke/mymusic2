name: Build Android APK (FINAL FIX)
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # Стабильная версия
          
      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/app @capacitor/share @capacitor/filesystem
          
      - name: Build Web Project
        run: |
          npm run build || mkdir dist && cp index.html dist/ # Костыль, если нет скрипта билда
        
      - name: Initialize Capacitor Config
        run: |
          # Создаем конфиг на лету, чтобы не было ошибки Missing appId
          echo '{"appId": "com.evgen.music", "appName": "EVGEN MUSIC", "webDir": "dist", "bundledWebRuntime": false}' > capacitor.config.json

      - name: Add Android Platform
        run: npx cap add android

      - name: Force Background Permissions
        run: |
          # Теперь файлы точно существуют, и мы их правим
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET" />' $MANIFEST
          sed -i '/<application/i \    <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />' $MANIFEST
          sed -i '/<application/i \    <uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK" />' $MANIFEST
          sed -i '/<application/i \    <uses-permission android:name="android.permission.WAKE_LOCK" />' $MANIFEST
          
          # Указываем тип сервиса для Android 14
          sed -i 's/<activity/<service android:name="com.getcapacitor.CapacitorVideoPlayer" android:enabled="true" android:exported="false" android:foregroundServiceType="mediaPlayback" \/><activity/' $MANIFEST
          
          npx cap sync android

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17' # Откатились с 21 на 17 для стабильности
          distribution: 'temurin'

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: evgen-music-v2
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
