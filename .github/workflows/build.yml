name: Build Android APK (Debug Mode)
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets @capacitor/share @capacitor/filesystem @capacitor/app

      - name: Build Web Project
        run: |
          # Собираем с относительными путями через флаг
          npm run build -- --base=./
          
          # Добавляем скрипт отладки прямо в index.html, чтобы видеть ошибки на экране
          DEBUG_SCRIPT='<script>window.onerror=function(m,u,l){alert("Error: "+m+" at "+u+":"+l);};window.addEventListener("unhandledrejection",function(e){alert("Promise Error: "+e.reason);});</script>'
          sed -i "s|<head>|<head>${DEBUG_SCRIPT}|" dist/index.html
          
          # На всякий случай еще раз чиним пути, если Vite их проигнорировал
          sed -i 's/href="\//href=".\//g' dist/index.html
          sed -i 's/src="\//src=".\//g' dist/index.html

      - name: Initialize Capacitor
        run: |
          echo '{"appId": "com.evgen.music", "appName": "EVGEN MUSIC", "webDir": "dist"}' > capacitor.config.json
          npx cap add android || true

      - name: Generate Assets
        run: |
          mkdir -p assets
          [ -f "icon.png" ] && cp icon.png assets/icon.png
          if [ -f "assets/icon.png" ]; then
            npx capacitor-assets generate --android
          fi

      - name: Configure Android Permissions
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          # Полная очистка манифеста от дублей перед вставкой
          sed -i '/android.permission.INTERNET/d' $MANIFEST
          sed -i '/<application/i <uses-permission android:name="android.permission.INTERNET" />\n<uses-permission android:name="android.permission.FOREGROUND_SERVICE" />\n<uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK" />\n<uses-permission android:name="android.permission.WAKE_LOCK" />' $MANIFEST
          npx cap sync android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: music-app-debug-ui
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
