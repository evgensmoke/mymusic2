      - name: Inject Permissions & Background Services
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          # 1. Удаляем старые права (чтобы не было дублей, на которые ругался билд)
          sed -i '/android.permission.INTERNET/d' $MANIFEST
          
          # 2. Вставляем пачку прав: Интернет, Фон, Будильник (WAKE_LOCK) и Запись файлов
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK" />\n    <uses-permission android:name="android.permission.WAKE_LOCK" />\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />' $MANIFEST
          
          # 3. Регистрация сервиса внутри <application>
          # Это та самая деталь, которую "умные дяденьки" используют, чтобы музыка не глохла
          SERVICE_TAG='<service android:name="com.getcapacitor.CapacitorVideoPlayer" android:enabled="true" android:exported="false" android:foregroundServiceType="mediaPlayback" />'
          sed -i "s|<activity|$SERVICE_TAG<activity|" $MANIFEST
          
          npx cap sync android
          
