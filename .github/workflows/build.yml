name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets @capacitor/share @capacitor/filesystem @capacitor/app

      - name: Build Web Project
        run: |
          # Устанавливаем базу для путей, чтобы не было черного экрана
          npm run build -- --base=./ 

      - name: Check Build Output (Диагностика)
        run: |
          echo "Содержимое папки dist:"
          ls -R dist || echo "Папка dist НЕ НАЙДЕНА!"

      - name: Initialize Capacitor
        run: |
          # Если на шаге выше dist не нашелся, замени 'dist' на то, что выдал ls
          echo '{"appId": "com.evgen.music", "appName": "EVGEN MUSIC", "webDir": "dist"}' > capacitor.config.json
          npx cap add android || true

      - name: Generate Assets (Icon fix)
        run: |
          mkdir -p assets
          [ -f "icon.png" ] && cp icon.png assets/icon.png
          [ -f "icon.jpg" ] && cp icon.jpg assets/icon.png
          if [ -f "assets/icon.png" ]; then
            npx capacitor-assets generate --android
          fi

      - name: Configure Android Permissions
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i '/android.permission.INTERNET/d' $MANIFEST
          sed -i '/<application/i <uses-permission android:name="android.permission.INTERNET" />\n<uses-permission android:name="android.permission.FOREGROUND_SERVICE" />\n<uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK" />\n<uses-permission android:name="android.permission.WAKE_LOCK" />' $MANIFEST
          npx cap sync android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: evgen-music-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
