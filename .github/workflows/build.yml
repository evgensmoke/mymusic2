name: Build Android APK (STABLE VERSION)
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps
          # Ставим только то, что реально существует и нужно
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/app @capacitor/share @capacitor/filesystem
          
      - name: Build Web Project
        run: |
          npm run build || (mkdir -p dist && echo "<html></html>" > dist/index.html)
        
      - name: Capacitor Config & Android Platform
        run: |
          # Создаем конфиг, чтобы не было ошибки Missing appId
          echo '{"appId": "com.evgen.music", "appName": "EVGEN MUSIC", "webDir": "dist"}' > capacitor.config.json
          npx cap add android || true

      - name: Inject Permissions & Background Mode
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          # Добавляем права только если их еще нет, чтобы избежать дубликатов
          grep -q "FOREGROUND_SERVICE" $MANIFEST || sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK" />\n    <uses-permission android:name="android.permission.WAKE_LOCK" />' $MANIFEST
          
          # Настройка сервиса для фонового аудио
          sed -i 's/<activity/<service android:name="com.getcapacitor.CapacitorVideoPlayer" android:enabled="true" android:exported="false" android:foregroundServiceType="mediaPlayback" \/><activity/' $MANIFEST
          
          npx cap sync android

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: evgen-music-v3
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
