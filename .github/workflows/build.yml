name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/app @capacitor/filesystem

      - name: Build Web Project
        run: |
          npm run build || (mkdir -p dist && echo "<html></html>" > dist/index.html)

      - name: Initialize Capacitor
        run: |
          echo '{"appId": "com.evgen.music", "appName": "EVGEN MUSIC", "webDir": "dist"}' > capacitor.config.json
          npx cap add android || true

      - name: Configure Android Permissions
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          # Удаляем дубликат, если он есть
          sed -i '/android.permission.INTERNET/d' $MANIFEST
          # Добавляем права на фон и скачивание
          sed -i '/<application/i <uses-permission android:name="android.permission.INTERNET" />\n<uses-permission android:name="android.permission.FOREGROUND_SERVICE" />\n<uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK" />\n<uses-permission android:name="android.permission.WAKE_LOCK" />\n<uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />' $MANIFEST
          # Регистрируем сервис для музыки
          sed -i 's/<activity/<service android:name="com.getcapacitor.CapacitorVideoPlayer" android:enabled="true" android:exported="false" android:foregroundServiceType="mediaPlayback" \/><activity/' $MANIFEST
          npx cap sync android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: evgen-music-pro
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
