name: Build Android APK (Background Audio Edition)
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets @capacitor/filesystem @capacitor/share

      - name: Build Web Project (Не трогаем руками!)
        run: |
          # Чистая сборка, как вчера в 00:30. Никакой отсебятины и замены путей.
          npm run build

      - name: Initialize Capacitor
        run: |
          echo '{"appId": "com.evgen.music", "appName": "EVGEN MUSIC", "webDir": "dist"}' > capacitor.config.json
          npx cap add android || true
          
      - name: Generate Assets
        run: |
          mkdir -p assets
          [ -f "icon.png" ] && cp icon.png assets/icon.png
          if [ -f "assets/icon.png" ]; then
            npx capacitor-assets generate --android
          fi

      - name: Inject Background & Download Permissions
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i '/android.permission.INTERNET/d' $MANIFEST
          
          # Аккуратно вставляем права: Интернет, Фон, Будильник (не даем уснуть процу), и Память
          PERMS='<uses-permission android:name="android.permission.INTERNET" />\n<uses-permission android:name="android.permission.FOREGROUND_SERVICE" />\n<uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK" />\n<uses-permission android:name="android.permission.WAKE_LOCK" />\n<uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />\n<uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />'
          
          sed -i "/<application/i $PERMS" $MANIFEST
          
          npx cap sync android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build APK
        run: |
          cd android
          # Укрощаем Gradle, чтобы не было ошибок версии Java
          echo "org.gradle.java.home=$JAVA_HOME" >> gradle.properties
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: evgen-music-background
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
